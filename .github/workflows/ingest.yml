name: Ingest World Cup matches

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *' 
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ingest finished matches
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          CRDB_HOST: ${{ secrets.CRDB_HOST }}
          CRDB_USER: ${{ secrets.CRDB_USER }}
          CRDB_PASSWORD: ${{ secrets.CRDB_PASSWORD }}
          CRDB_DATABASE: ${{ secrets.CRDB_DATABASE }}
        run: python ingest_world_cup.py
